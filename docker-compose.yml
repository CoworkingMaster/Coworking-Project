services:
  # ──────────────────────────────────────────────
  # Base de datos — MySQL 8.0
  # ──────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: workhub-db
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 3s
      timeout: 2s
      retries: 20
      start_period: 10s
    networks:
      - workhub-net

  # ──────────────────────────────────────────────
  # Backend — Django API
  # (imagen final sin build tools gracias al multi-stage)
  # ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: workhub-backend
    restart: unless-stopped
    command: sh /app/wait_for_db.sh
    init: true
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_pip_cache:/root/.cache/pip
    depends_on:
      - db
    networks:
      - workhub-net

  # ──────────────────────────────────────────────
  # Frontend — React + Vite (dev server)
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: workhub-frontend
    restart: unless-stopped
    init: true
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - frontend_node_modules:/app/node_modules
      - ./frontend/src:/app/src        # solo el código fuente, HMR instantáneo
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
    depends_on:
      - backend
    networks:
      - workhub-net

volumes:
  mysql_data:
  frontend_node_modules:
  backend_pip_cache:

networks:
  workhub-net:
    driver: bridge
